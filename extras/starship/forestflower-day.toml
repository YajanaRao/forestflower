# Forest Flower Day Powerline Preset for Starship
# Source of truth: DESIGN.md
# Chrome: deep forest green (#044123). Surfaces: Everforest Light Soft parchment tones.

format = """
[](#044123)\
$directory\
[](fg:#044123 bg:#CAD8E2)\
$git_branch\
$git_status\
[](fg:#CAD8E2 bg:#F4F0D9)\
$jobs\
[](fg:#F4F0D9 bg:#FBE8D3)\
$bun\
$nodejs\
$python\
$rust\
$golang\
[](fg:#FBE8D3)\
"""

[directory]
style = "bg:#044123 fg:#FDF6E3"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = " "
"Pictures" = " "
"Code" = "󰨞 "
"Developer" = "󰨞 "

[git_branch]
symbol = ""
style = "bg:#CAD8E2 fg:#044123"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#CAD8E2 fg:#044123"
format = '[$all_status$ahead_behind ]($style)'

[jobs]
symbol = "✦"
style = "bg:#F4F0D9 fg:#5C6A72"
format = "[ $symbol $number ]($style)"
number_threshold = 1

[bun]
symbol = ""
style = "bg:#FBE8D3 fg:#5C6A72"
format = '[ $symbol ($version) ]($style)'
detect_files = ['bun.lockb', 'bunfig.toml']

[nodejs]
symbol = "󰎙"
style = "bg:#FBE8D3 fg:#5C6A72"
format = '[ $symbol ($version) ]($style)'
detect_files = ['package.json', '.node-version', '.nvmrc']

[python]
symbol = " "
style = "bg:#FBE8D3 fg:#5C6A72"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#FBE8D3 fg:#5C6A72"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:#FBE8D3 fg:#5C6A72"
format = '[ $symbol ($version) ]($style)'
