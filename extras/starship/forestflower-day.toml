# Forest Flower Powerline Preset for Starship
# GENERATED from this template by scripts/generate.mjs — edit the template, not the output.

format = """
[](#6F5800)\
$directory\
[](fg:#6F5800 bg:#E1E0C1)\
$git_branch\
$git_status\
[](fg:#E1E0C1 bg:#24837B)\
$jobs\
[](fg:#24837B bg:#FBE8D3)\
$bun\
$nodejs\
$python\
$rust\
$golang\
[](fg:#FBE8D3)\
"""

[directory]
style = "bg:#6F5800 fg:#FDF6E3"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = " "
"Pictures" = " "
"Code" = "󰨞 "
"Developer" = "󰨞 "

[git_branch]
symbol = ""
style = "bg:#E1E0C1 fg:#6F5800"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#E1E0C1 fg:#6F5800"
format = '[$all_status$ahead_behind ]($style)'

[jobs]
symbol = "✦"
style = "bg:#24837B fg:#FDF6E3"
format = "[ $symbol $number ]($style)"
number_threshold = 1

[bun]
symbol = ""
style = "bg:#FBE8D3 fg:#6F5800"
format = '[ $symbol ($version) ]($style)'
detect_files = ['bun.lockb', 'bunfig.toml']

[nodejs]
symbol = "󰎙"
style = "bg:#FBE8D3 fg:#6F5800"
format = '[ $symbol ($version) ]($style)'
detect_files = ['package.json', '.node-version', '.nvmrc']

[python]
symbol = " "
style = "bg:#FBE8D3 fg:#6F5800"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#FBE8D3 fg:#6F5800"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:#FBE8D3 fg:#6F5800"
format = '[ $symbol ($version) ]($style)'
