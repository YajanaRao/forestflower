# Forest Flower Powerline Preset for Starship — Night
# Source of truth: DESIGN.md
# Chrome: Cobalt 2 gold. Surfaces: Everforest tonal steps.

format = """
[](#FFC600)\
$directory\
[](fg:#FFC600 bg:#3A5A40)\
$git_branch\
$git_status\
[](fg:#3A5A40 bg:#7FBBB3)\
$jobs\
[](fg:#7FBBB3 bg:#403319)\
$bun\
$nodejs\
$python\
$rust\
$golang\
[](fg:#403319)\
"""

[directory]
style = "bg:#FFC600 fg:#1D2226"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = " "
"Pictures" = " "
"Code" = "󰨞 "
"Developer" = "󰨞 "

[git_branch]
symbol = ""
style = "bg:#3A5A40 fg:#FFC600"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#3A5A40 fg:#FFC600"
format = '[$all_status$ahead_behind ]($style)'

[jobs]
symbol = "✦"
style = "bg:#7FBBB3 fg:#1D2226"
format = "[ $symbol $number ]($style)"
number_threshold = 1

[bun]
symbol = ""
style = "bg:#403319 fg:#FFC600"
format = '[ $symbol ($version) ]($style)'
detect_files = ['bun.lockb', 'bunfig.toml']

[nodejs]
symbol = "󰎙"
style = "bg:#403319 fg:#FFC600"
format = '[ $symbol ($version) ]($style)'
detect_files = ['package.json', '.node-version', '.nvmrc']

[python]
symbol = " "
style = "bg:#403319 fg:#FFC600"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#403319 fg:#FFC600"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:#403319 fg:#FFC600"
format = '[ $symbol ($version) ]($style)'
