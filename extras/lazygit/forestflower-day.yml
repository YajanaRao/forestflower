# Forest Flower (Day) — lazygit UI chrome theme
# Source of truth: DESIGN.md
# Chrome accent: deep forest green (#044123). Selected row: selection pale-navy
# (#CAD8E2) — primary-container cream is invisible on the cream canvas, so the
# selection token is used instead: clear separation + readable dark text.
#
# Theme-only layer — compose with your base config, never replaces it:
#   lazygit -ucf ~/.config/lazygit/config.yml,~/.config/lazygit/forestflower-day.yml
#
# Diffs are rendered by delta — install ../delta/forestflower.gitconfig too.

gui:
  theme:
    activeBorderColor:
      - "#044123"
      - bold
    inactiveBorderColor:
      - "#829181"
    searchingActiveBorderColor:
      - "#044123"
      - bold
    optionsTextColor:
      - "#205EA6"
    selectedLineBgColor:
      - "#CAD8E2"
    inactiveViewSelectedLineBgColor:
      - "#E6E2CC"
    cherryPickedCommitFgColor:
      - "#044123"
    cherryPickedCommitBgColor:
      - "#CAD8E2"
    markedBaseCommitFgColor:
      - "#044123"
    markedBaseCommitBgColor:
      - "#FBE8D3"
    unstagedChangesColor:
      - "#942822"
    defaultFgColor:
      - "#5C6A72"
